
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;}
.app{font-family:'Nunito',sans-serif;padding:16px 0;}

/* Header */
.app-header{background:linear-gradient(135deg,#0c4a6e 0%,#0284c7 100%);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:12px;margin-bottom:20px;box-shadow:0 4px 16px rgba(2,100,199,0.25);}
.app-header-icon{font-size:26px;line-height:1;}
.app-header h1{font-family:'Fredoka One',cursive;font-size:20px;color:#fff;letter-spacing:.5px;line-height:1.1;}
.app-header p{font-size:11px;color:#bae6fd;margin-top:2px;}

/* Layout */
.layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.panel{background:#fff;border-radius:16px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.08);flex:1 1 280px;min-width:260px;}
.preview-area{flex:2 1 360px;}
.preview-label{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}

/* Form */
label.field-label{display:block;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
input[type=text],textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-family:'Patrick Hand',cursive;font-size:16px;color:#0f172a;background:#f8fafc;outline:none;}
input[type=text]:focus,textarea:focus{border-color:#0284c7;}
textarea{resize:vertical;font-size:14px;}
.field{margin-bottom:16px;}
.section-sep{border:none;border-top:1px solid #f1f5f9;margin:4px 0 16px;}
.section-label{display:block;font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}

/* Mode buttons */
.mode-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.mode-btn{padding:5px 12px;border-radius:999px;border:1.5px solid #dbeafe;background:#f0f9ff;color:#0369a1;font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;line-height:1.6;}
.mode-btn.active{border-color:#0284c7;background:#0284c7;color:#fff;}

/* Range */
.range-row input[type=range]{width:100%;accent-color:#0284c7;margin-top:4px;}

/* Checkbox */
.check-row{display:flex;align-items:center;gap:9px;margin-bottom:20px;}
.check-row input{width:16px;height:16px;accent-color:#0284c7;cursor:pointer;}
.check-row label{font-size:13px;color:#475569;cursor:pointer;}

/* Buttons */
.btn-print{width:100%;padding:12px 0;border-radius:10px;border:none;background:linear-gradient(135deg,#0284c7 0%,#0ea5e9 100%);color:#fff;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;letter-spacing:.4px;margin-bottom:8px;box-shadow:0 2px 8px rgba(2,132,199,0.35);}
.btn-dl{width:100%;padding:11px 0;border-radius:10px;border:1.5px solid #bae6fd;background:#f0f9ff;color:#0284c7;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;}
.tip{font-size:11px;color:#94a3b8;text-align:center;margin-top:9px;}

/* Worksheet preview */
.ws{background:#fff;border-radius:3px;padding:40px 48px;box-shadow:0 8px 40px rgba(0,0,0,0.13),0 1px 4px rgba(0,0,0,0.07);font-family:'Nunito',sans-serif;}
.ws-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:2px solid #bae6fd;}
.ws-title{font-family:'Fredoka One',cursive;font-size:22px;color:#0369a1;text-transform:uppercase;letter-spacing:1px;line-height:1.1;}
.ws-subtitle{font-size:12px;color:#64748b;font-style:italic;margin-top:4px;}
.tracing-block{margin-bottom:14px;}
.student-badge{font-size:10px;font-weight:800;color:#0ea5e9;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.ws-footer{border-top:1px dashed #e2e8f0;margin-top:16px;padding-top:10px;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;}
svg.tracing-svg{width:100%;display:block;overflow:visible;}
</style>

<div class="app">
  <div class="app-header">
    <div class="app-header-icon">✏️</div>
    <div>
      <h1>Pontiletra</h1>
      <p>Gerador de folhas de caligrafia</p>
    </div>
  </div>

  <div class="layout">
    <!-- Config Panel -->
    <div class="panel">
      <span class="section-label">Tipo de Atividade</span>
      <div class="mode-btns">
        <button class="mode-btn active" data-mode="single_name">Nome Individual</button>
        <button class="mode-btn" data-mode="single_letter">Letra Individual</button>
        <button class="mode-btn" data-mode="phrase">Frase</button>
        <button class="mode-btn" data-mode="student_list">Lista de Alunos</button>
      </div>

      <div class="field" id="field-name">
        <label class="field-label">Nome do Aluno</label>
        <input type="text" id="inp-name" value="Carolina" placeholder="Ex: Carolina">
      </div>

      <div class="field" id="field-letter" style="display:none;">
        <label class="field-label">Letra para Treinar</label>
        <input type="text" id="inp-letter" value="A" maxlength="2" style="font-size:30px;text-align:center;width:70px;">
        <div style="margin-top:12px;">
          <label class="field-label">Repetições por linha: <span id="rep-val">8</span></label>
          <div class="range-row"><input type="range" id="inp-repeat" min="3" max="20" value="8"></div>
        </div>
      </div>

      <div class="field" id="field-phrase" style="display:none;">
        <label class="field-label">Frase</label>
        <textarea id="inp-phrase" rows="3" placeholder="Ex: O gato subiu no telhado.">O gato subiu no telhado.</textarea>
      </div>

      <div class="field" id="field-students" style="display:none;">
        <label class="field-label">Lista de Alunos (um por linha)</label>
        <textarea id="inp-students" rows="7" placeholder="Ana&#10;Carlos&#10;Mariana">Ana
Carlos
Mariana
João
Sofia</textarea>
        <div id="student-count" style="font-size:11px;color:#94a3b8;margin-top:5px;"></div>
      </div>

      <hr class="section-sep">
      <span class="section-label">Configurar Folha</span>

      <div class="field">
        <label class="field-label">Título</label>
        <input type="text" id="inp-title" value="Meu Nome" style="font-family:'Nunito',sans-serif;font-size:14px;">
      </div>

      <div class="field">
        <label class="field-label">Instrução</label>
        <input type="text" id="inp-subtitle" value="Trace as letras pontilhadas para praticar a escrita." style="font-family:'Nunito',sans-serif;font-size:13px;">
      </div>

      <div class="field">
        <label class="field-label">Linhas de treino: <span id="lines-val">3</span></label>
        <div class="range-row"><input type="range" id="inp-lines" min="1" max="6" value="3"></div>
      </div>

      <div class="check-row">
        <input type="checkbox" id="chk-example" checked>
        <label for="chk-example">Mostrar linha de exemplo</label>
      </div>

      <button class="btn-print" onclick="handlePrint()">🖨️ Imprimir</button>
      <button class="btn-dl" onclick="handleDownload()">💾 Baixar HTML</button>
      <p class="tip">Ctrl+P para salvar como PDF</p>
    </div>

    <!-- Preview -->
    <div class="preview-area">
      <div class="preview-label">Pré-visualização · A4</div>
      <div id="worksheet-wrapper"></div>
    </div>
  </div>
</div>

<script>
const state = {
  mode: 'single_name',
  name: 'Carolina',
  letter: 'A',
  letterRepeat: 8,
  phrase: 'O gato subiu no telhado.',
  students: ['Ana','Carlos','Mariana','João','Sofia'],
  lines: 3,
  showLetterBox: false,
  title: 'Meu Nome',
  subtitle: 'Trace as letras pontilhadas para praticar a escrita.',
};

const SVG_W = 680;

const LETTER_BIG_FS = 130;

function tracingSVGLetter(letter) {
  const fs = LETTER_BIG_FS;
  const h = fs + 38;
  const lc = '#93c5fd';
  return `<svg class="tracing-svg" viewBox="0 0 ${SVG_W} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><style>@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');</style></defs>
    <line x1="10" y1="${h-8}" x2="${SVG_W-10}" y2="${h-8}" stroke="${lc}" stroke-width="1.5"/>
    <line x1="10" y1="${h/2-2}" x2="${SVG_W-10}" y2="${h/2-2}" stroke="${lc}" stroke-width="0.7" stroke-dasharray="4 4"/>
    <line x1="10" y1="6" x2="${SVG_W-10}" y2="6" stroke="${lc}" stroke-width="1"/>
    <text x="${SVG_W/2}" y="${fs+2}" text-anchor="middle" font-family="'Patrick Hand',cursive" font-size="${fs}" fill="#1e293b">${escXML(letter)}</text>
  </svg>`;
}

function tracingSVG(text, fontSize, mode) {
  const h = fontSize + 38;
  const lc = '#93c5fd';
  const tc = mode === 'solid' ? '#1e293b' : '#c0cfe8';
  const dash = mode === 'solid' ? '' : `stroke-dasharray="3 5" stroke-linecap="round"`;
  const fill = mode === 'solid' ? `fill="${tc}"` : `fill="none" stroke="${tc}" stroke-width="2.5" ${dash}`;
  return `<svg class="tracing-svg" viewBox="0 0 ${SVG_W} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><style>@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');</style></defs>
    <line x1="10" y1="${h-8}" x2="${SVG_W-10}" y2="${h-8}" stroke="${lc}" stroke-width="1.5"/>
    <line x1="10" y1="${h/2-2}" x2="${SVG_W-10}" y2="${h/2-2}" stroke="${lc}" stroke-width="0.7" stroke-dasharray="4 4"/>
    <line x1="10" y1="6" x2="${SVG_W-10}" y2="6" stroke="${lc}" stroke-width="1"/>
    <text x="16" y="${fontSize+2}" font-family="'Patrick Hand',cursive" font-size="${fontSize}" ${fill}>${escXML(text)}</text>
  </svg>`;
}

function escXML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const PRINT_CSS = `
@page{size:A4 portrait;margin:1.5cm;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:#fff;}
body{font-family:'Nunito',sans-serif;}
.ws{width:100%;}
.ws-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #bae6fd;}
.ws-title{font-family:'Fredoka One',cursive;font-size:20px;color:#0369a1;text-transform:uppercase;letter-spacing:1px;}
.ws-subtitle{font-size:11px;color:#64748b;font-style:italic;margin-top:3px;}
.tracing-block{margin-bottom:10px;}
.student-badge{font-size:10px;font-weight:700;color:#0ea5e9;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
svg.tracing-svg{width:100%;display:block;}
.ws-footer{border-top:1px dashed #e2e8f0;margin-top:14px;padding-top:9px;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;}
`;

function buildWorksheetHTML(items, single) {
  const fs = state.mode === 'single_letter' ? 56 : 68;
  let blocks = '';
  items.forEach((item, i) => {
    let txt = state.mode === 'single_letter' ? state.letter.repeat(state.letterRepeat) : item;
    let badge = (!single && state.mode === 'student_list')
      ? `<div class="student-badge">✦ ${escXML(item)}</div>` : '';
    let ex = state.showExample
      ? (state.mode === 'single_letter' ? tracingSVGLetter(state.letter) : tracingSVG(txt, fs, 'solid'))
      : '';
    let dotLines = '';
    for (let l = 0; l < state.lines; l++) dotLines += tracingSVG(txt, fs, 'dotted');
    let pb = (!single && i < items.length-1) ? 'page-break-after:always;' : '';
    blocks += `<div class="tracing-block" style="${pb}">${badge}${ex}${dotLines}</div>`;
  });
  return `<div class="ws" id="worksheet-root">
    <div class="ws-header">
      <div>
        <div class="ws-title">${escXML(state.title)}</div>
        <div class="ws-subtitle">${escXML(state.subtitle)}</div>
      </div>
      <div style="font-size:36px;line-height:1;">✏️</div>
    </div>
    ${blocks}
    <div class="ws-footer">
      <span>Data: ___/___/______</span>
      <span>Nome: _______________________</span>
    </div>
  </div>`;
}

function getItems() {
  if (state.mode === 'single_name') return [state.name || 'Nome'];
  if (state.mode === 'single_letter') return [state.letter || 'A'];
  if (state.mode === 'phrase') return [state.phrase || 'Frase'];
  if (state.mode === 'student_list') return state.students.filter(s => s.trim());
  return [''];
}

function render() {
  const items = getItems();
  const preview = state.mode === 'student_list'
    ? buildWorksheetHTML([items[0] || 'Aluno'], true)
    : buildWorksheetHTML(items, true);
  document.getElementById('worksheet-wrapper').innerHTML = preview;
  const cnt = document.getElementById('student-count');
  if (cnt) cnt.textContent = `${state.students.filter(s=>s.trim()).length} aluno(s) · uma folha por aluno`;
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const fields = {
      single_name: ['field-name'],
      single_letter: ['field-letter'],
      phrase: ['field-phrase'],
      student_list: ['field-students'],
    };
    ['field-name','field-letter','field-phrase','field-students'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    (fields[state.mode] || []).forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = '';
    });
    render();
  });
});

document.getElementById('inp-name').addEventListener('input', e => { state.name = e.target.value; render(); });
document.getElementById('inp-letter').addEventListener('input', e => { state.letter = e.target.value || 'A'; render(); });
document.getElementById('inp-repeat').addEventListener('input', e => {
  state.letterRepeat = +e.target.value;
  document.getElementById('rep-val').textContent = e.target.value;
  render();
});
document.getElementById('inp-phrase').addEventListener('input', e => { state.phrase = e.target.value; render(); });
document.getElementById('inp-students').addEventListener('input', e => {
  state.students = e.target.value.split('\n');
  render();
});
document.getElementById('inp-title').addEventListener('input', e => { state.title = e.target.value; render(); });
document.getElementById('inp-subtitle').addEventListener('input', e => { state.subtitle = e.target.value; render(); });
document.getElementById('inp-lines').addEventListener('input', e => {
  state.lines = +e.target.value;
  document.getElementById('lines-val').textContent = e.target.value;
  render();
});
document.getElementById('chk-example').addEventListener('change', e => { state.showExample = e.target.checked; render(); });

function handlePrint() {
  const items = getItems();
  const html = buildWorksheetHTML(items, false);
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>${PRINT_CSS}</style></head><body>${html}</body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 800);
}

function handleDownload() {
  const items = getItems();
  const html = buildWorksheetHTML(items, false);
  const full = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Patrick+Hand&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>${PRINT_CSS}</style></head><body>${html}</body></html>`;
  const blob = new Blob([full], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'atividade-caligrafia.html'; a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
